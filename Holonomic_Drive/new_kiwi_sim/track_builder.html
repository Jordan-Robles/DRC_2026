<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DRC Track Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: 'JetBrains Mono','Fira Code',monospace; font-size:12px; color:#ccc; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:#111; } ::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
button { font-family:inherit; cursor:pointer; }
</style>
</head>
<body>
<div id="app" style="display:flex;flex:1;height:100vh;overflow:hidden;"></div>
<script>
/*
  GEOMETRY:
  - Grid cell = 0.5m real
  - Straight H: drawn ON the top edge of the anchor cell  (y = row * cellPx)
  - Straight V: drawn ON the left edge of the anchor cell (x = col * cellPx)
  - Diagonals: corner to corner of cell
  - Arc R0.5: radius = 1 cell, corner at a cell corner
  - Arc R1.0: radius = 2 cells, corner at a cell corner
  - Multiple segments can share the same cell (layers)
  - RMB erases ALL segments on a cell
  - Erase tool removes topmost segment on a cell
*/
const CELL = 44;
const REAL = 0.5;
const TAPE_REAL = 0.036;
// Grid is unbounded — MAX_COORD is a sanity cap only
const MAX_COORD = 4000;
const COLORS = { yellow:"#f5c842", blue:"#3a8fff", green:"#00e060" };

const SEGS = [
  {id:"sh_t",   label:"H top",        cat:"Straights"},
  {id:"sh_b",   label:"H bottom",     cat:"Straights"},
  {id:"sv_l",   label:"V left",       cat:"Straights"},
  {id:"sv_r",   label:"V right",      cat:"Straights"},
  {id:"d_nwse", label:"Diag ╲",      cat:"Diagonals"},
  {id:"d_nesw", label:"Diag ╱",      cat:"Diagonals"},
  {id:"a05_ne", label:"R0.5 NE",     cat:"Arc R=0.5m"},
  {id:"a05_nw", label:"R0.5 NW",     cat:"Arc R=0.5m"},
  {id:"a05_se", label:"R0.5 SE",     cat:"Arc R=0.5m"},
  {id:"a05_sw", label:"R0.5 SW",     cat:"Arc R=0.5m"},
  {id:"a1_ne",  label:"R1.0 NE",     cat:"Arc R=1.0m"},
  {id:"a1_nw",  label:"R1.0 NW",     cat:"Arc R=1.0m"},
  {id:"a1_se",  label:"R1.0 SE",     cat:"Arc R=1.0m"},
  {id:"a1_sw",  label:"R1.0 SW",     cat:"Arc R=1.0m"},
  {id:"hc_n",   label:"½ circle N",  cat:"Half Circle"},
  {id:"hc_s",   label:"½ circle S",  cat:"Half Circle"},
  {id:"hc_e",   label:"½ circle E",  cat:"Half Circle"},
  {id:"hc_w",   label:"½ circle W",  cat:"Half Circle"},
  {id:"sf_h",   label:"S/F horiz",   cat:"Start/Finish"},
  {id:"sf_v",   label:"S/F vert",    cat:"Start/Finish"},
];

// Draw a segment. All coords relative to canvas origin (already translated).
// (col, row) = grid cell. cp = cell size in px.
function drawSeg(ctx, id, col, row, cp, color) {
  const C = COLORS[color] || COLORS.yellow;
  const tw = Math.max(2, (TAPE_REAL / REAL) * cp);
  ctx.strokeStyle = C;
  ctx.lineWidth = tw;
  ctx.lineCap = "butt";

  const L = col * cp,       T = row * cp;
  const R = (col+1) * cp,   B = (row+1) * cp;
  const ins = tw / 2;   // inset distance (half tape width)

  ctx.beginPath();
  if (id === "sh_t") {
    // Full cell width — no end gaps between adjacent cells.
    // lineCap butt + full extent means adjacent sh_t tiles connect seamlessly.
    ctx.moveTo(L, T + ins); ctx.lineTo(R, T + ins); ctx.stroke();
  } else if (id === "sh_b") {
    ctx.moveTo(L, B - ins); ctx.lineTo(R, B - ins); ctx.stroke();
  } else if (id === "sv_l") {
    ctx.moveTo(L + ins, T); ctx.lineTo(L + ins, B); ctx.stroke();
  } else if (id === "sv_r") {
    ctx.moveTo(R - ins, T); ctx.lineTo(R - ins, B); ctx.stroke();
  } else if (id === "d_nwse") {
    // Diagonal ╲ — endpoints pulled inward by ins/√2 on each axis so they
    // land at the same inset corner that straights use
    const di = ins / Math.SQRT2;
    ctx.lineCap = "round";
    ctx.moveTo(L + di, T + di); ctx.lineTo(R - di, B - di);
    ctx.stroke();
  } else if (id === "d_nesw") {
    // Diagonal ╱
    const di = ins / Math.SQRT2;
    ctx.lineCap = "round";
    ctx.moveTo(R - di, T + di); ctx.lineTo(L + di, B - di);
    ctx.stroke();
  } else if (id.startsWith("hc_")) {
    // Half-circle fitting one cell. r=cp/2. Centre on flat boundary edge.
    // Canvas convention: 0=right, π/2=DOWN, π=left, 3π/2=up (Y-down).
    // anticlockwise=false → angle INCREASES (visually CW in Y-down coords).
    // anticlockwise=true  → angle DECREASES (visually CCW).
    //
    // hc_e (REFERENCE — known good): flat RIGHT (x=R-ins), dome LEFT
    //   arc(R-ins, midY, r, π/2, -π/2, false)
    //   increasing from π/2: π/2(down)→π(left)→3π/2(up) → left semicircle ✓
    //
    // hc_w: flat LEFT (x=L+ins), dome RIGHT
    //   arc(L+ins, midY, r, -π/2, π/2, false)
    //   increasing from -π/2: -π/2(up)→0(right)→π/2(down) → right semicircle ✓
    //
    // hc_n: flat TOP (y=T+ins), dome DOWN
    //   arc(midX, T+ins, r, π, 0, true)
    //   decreasing from π: π(left)→π/2(down)→0(right) → bottom semicircle ✓
    //
    // hc_s: flat BOTTOM (y=B-ins), dome UP
    //   arc(midX, B-ins, r, 0, π, true)
    //   decreasing from 0: 0(right)→-π/2=3π/2(up)→-π=π(left) → top semicircle ✓
    const dir = id.slice(3);
    const hr  = cp / 2;
    ctx.lineCap = "butt";
    let ocx, ocy, a0, a1, ccw;
    if (dir === "n") { ocx=(L+R)/2; ocy=T+ins;   a0=Math.PI;     a1=0;          ccw=true;  }
    if (dir === "s") { ocx=(L+R)/2; ocy=B-ins;   a0=0;           a1=Math.PI;    ccw=true;  }
    if (dir === "e") { ocx=R-ins;   ocy=(T+B)/2; a0=Math.PI/2;   a1=-Math.PI/2; ccw=false; }
    if (dir === "w") { ocx=L+ins;   ocy=(T+B)/2; a0=-Math.PI/2;  a1=Math.PI/2;  ccw=false; }
    ctx.arc(ocx, ocy, hr, a0, a1, ccw);
    ctx.stroke();
  } else if (id === "sf_h" || id === "sf_v") {
    // Start/finish line — always green, full-cell line with end ticks and spawn dot.
    ctx.strokeStyle = COLORS.green;
    ctx.lineWidth   = tw;
    ctx.lineCap     = "butt";
    const cx2 = (L+R)/2, cy2 = (T+B)/2;
    if (id === "sf_h") {
      ctx.beginPath(); ctx.moveTo(L, cy2); ctx.lineTo(R, cy2); ctx.stroke();
      ctx.lineWidth = tw*0.5;
      ctx.beginPath(); ctx.moveTo(L, cy2-tw); ctx.lineTo(L, cy2+tw); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(R, cy2-tw); ctx.lineTo(R, cy2+tw); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(cx2, T); ctx.lineTo(cx2, B); ctx.stroke();
      ctx.lineWidth = tw*0.5;
      ctx.beginPath(); ctx.moveTo(cx2-tw, T); ctx.lineTo(cx2+tw, T); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx2-tw, B); ctx.lineTo(cx2+tw, B); ctx.stroke();
    }
    ctx.fillStyle=COLORS.green;
    ctx.beginPath(); ctx.arc(cx2, cy2, tw*0.8, 0, Math.PI*2); ctx.fill();
  } else {
    // Quarter-arc corners (a05_* and a1_*)
    // The arc centreline is inset by ins from the cell boundary so the stroke
    // edge aligns exactly with straight segments at the same inset.
    const isR1 = id.startsWith("a1_");
    const dir  = id.slice(id.lastIndexOf("_")+1);
    const r    = isR1 ? cp*2 : cp;
    let ocx, ocy, a0, a1, ccw, ri;
    // For each corner the arc touches two cell edges; we offset the radius
    // so the outer edge of the stroke lands on the inset line of each edge.
    // NE: centre at bottom-left corner; arc goes from top (−90°) to right (0°)
    // The arc passes near the top edge (inset down by ins) and right edge
    // (inset left by ins), so centre-line radius = r − ins.
    if (dir==="ne") { ocx=L;     ocy=B;     a0=-Math.PI/2; a1=0;           ccw=false; ri=r-ins; }
    if (dir==="nw") { ocx=R;     ocy=B;     a0=-Math.PI;   a1=-Math.PI/2;  ccw=false; ri=r-ins; }
    if (dir==="se") { ocx=L;     ocy=T;     a0=Math.PI/2;  a1=0;           ccw=true;  ri=r-ins; }
    if (dir==="sw") { ocx=R;     ocy=T;     a0=Math.PI/2;  a1=Math.PI;     ccw=false; ri=r-ins; }
    ctx.arc(ocx, ocy, ri, a0, a1, ccw);
    ctx.stroke();
  }
}

function makePreview(id, color, size) {
  const c = document.createElement("canvas");
  c.width = size; c.height = size;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,size,size);
  // Faint grid lines
  ctx.strokeStyle = "#2e2e2e"; ctx.lineWidth = 0.5;
  for (let i=0;i<=2;i++) {
    ctx.beginPath(); ctx.moveTo(i*size/2,0); ctx.lineTo(i*size/2,size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*size/2); ctx.lineTo(size,i*size/2); ctx.stroke();
  }
  const isR1  = id.startsWith("a1_");
  const isHC  = id.startsWith("hc_");
  // cp = cell size in preview pixels
  // For R1.0 arcs we show a 2×2 grid so the arc fills the canvas; cp = size/2
  // For everything else cp = size (the whole canvas is one cell)
  const cp = isR1 ? size/2 : size;
  const dir = id.includes("_") ? id.slice(id.lastIndexOf("_")+1) : "";
  let col=0, row=0;
  if (isR1) {
    // Position the arc in the correct quadrant of the 2×2 grid
    if (dir==="ne"){col=0;row=1;} if (dir==="nw"){col=1;row=1;}
    if (dir==="se"){col=0;row=0;} if (dir==="sw"){col=1;row=0;}
  }
  // hc_* fits within a single cell; col=0,row=0 with cp=size is correct already
  drawSeg(ctx, id, col, row, cp, color);
  return c;
}

class App {
  constructor() {
    this.segments = [];
    this.selType  = "sh_t";
    this.selColor = "yellow";
    this.zoom = 1; this.pan = {x:24,y:24};
    this.painting=false; this.panning=false; this.panStart=null;
    this._stroke=null; this._tt=null;
    this.btnMap = {};
    this._history = [];   // undo stack — each entry is a JSON snapshot
    this._future  = [];   // redo stack
    this.build();
    window.addEventListener("resize", ()=>{ this.sizeCanvas(); this.redraw(); });
    // Undo / redo keyboard shortcuts
    window.addEventListener("keydown", e => {
      const mac = e.metaKey, win = e.ctrlKey;
      if (!(mac || win)) return;
      if (e.key === "z" && !e.shiftKey) { e.preventDefault(); this.undo(); }
      if ((e.key === "z" && e.shiftKey) || e.key === "y") { e.preventDefault(); this.redo(); }
    });
  }

  _snapshot() {
    // Call before any destructive change. Saves current state; clears redo stack.
    this._history.push(JSON.stringify(this.segments));
    if (this._history.length > 200) this._history.shift();
    this._future = [];
  }

  undo() {
    if (!this._history.length) { this.showToast("Nothing to undo"); return; }
    this._future.push(JSON.stringify(this.segments));
    this.segments = JSON.parse(this._history.pop());
    this.redraw(); this.updateStats(); this.showToast("Undo");
  }

  redo() {
    if (!this._future.length) { this.showToast("Nothing to redo"); return; }
    this._history.push(JSON.stringify(this.segments));
    this.segments = JSON.parse(this._future.pop());
    this.redraw(); this.updateStats(); this.showToast("Redo");
  }

  build() {
    const app = document.getElementById("app");
    app.innerHTML = "";

    /* SIDEBAR */
    const sb = document.createElement("div");
    sb.style.cssText = "width:186px;background:#161616;border-right:1px solid #222;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;";
    sb.innerHTML = `<div style="padding:12px 14px 10px;border-bottom:1px solid #222;flex-shrink:0;"><div style="font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:3px">DRC Track</div><div style="font-size:15px;font-weight:600;color:#eee">Line Builder</div></div>`;

    // Color
    const cpWrap = document.createElement("div");
    cpWrap.style.cssText = "padding:8px 10px 7px;border-bottom:1px solid #1e1e1e;flex-shrink:0;";
    cpWrap.innerHTML = `<div style="font-size:9px;letter-spacing:1.5px;color:#555;text-transform:uppercase;margin-bottom:5px">Tape color</div>`;
    const cpRow = document.createElement("div"); cpRow.style.cssText="display:flex;gap:5px;";
    ["yellow","blue"].forEach(col => {
      const btn = document.createElement("button");
      btn.dataset.color = col;
      btn.style.cssText = `flex:1;padding:5px 0;border-radius:5px;border:2px solid ${this.selColor===col?"#fff":"transparent"};background:${COLORS[col]};color:#111;font-size:10px;font-weight:600;`;
      btn.textContent = col==="yellow"?"Yellow":"Blue";
      btn.addEventListener("click",()=>this.setColor(col));
      cpRow.appendChild(btn);
    });
    cpWrap.appendChild(cpRow); sb.appendChild(cpWrap);

    // Palette
    [...new Set(SEGS.map(s=>s.cat))].forEach(cat => {
      const items = SEGS.filter(s=>s.cat===cat);
      const sec = document.createElement("div");
      sec.style.cssText = "padding:8px 10px 2px;";
      sec.innerHTML = `<div style="font-size:9px;letter-spacing:1.5px;color:#555;text-transform:uppercase;margin-bottom:5px">${cat}</div>`;
      const g = document.createElement("div"); g.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:3px;";
      items.forEach(seg => {
        const btn = document.createElement("button");
        const active = seg.id===this.selType;
        btn.style.cssText = `padding:0;border:2px solid ${active?"#fff":"transparent"};border-radius:5px;background:${active?"#252525":"transparent"};overflow:hidden;display:flex;flex-direction:column;align-items:center;`;
        const pc = makePreview(seg.id, this.selColor, 60);
        pc.style.cssText = "display:block;width:60px;height:60px;";
        btn.appendChild(pc);
        const lbl = document.createElement("div");
        lbl.style.cssText = `font-size:8px;color:${active?"#ddd":"#555"};padding:2px 0 4px;text-align:center;`;
        lbl.textContent = seg.label;
        btn.appendChild(lbl);
        btn.addEventListener("click",()=>this.setType(seg.id));
        this.btnMap[seg.id] = {btn,lbl,pc};
        g.appendChild(btn);
      });
      sec.appendChild(g); sb.appendChild(sec);
    });

    // Erase
    const erSec = document.createElement("div"); erSec.style.cssText="padding:8px 10px 4px;";
    erSec.innerHTML=`<div style="font-size:9px;letter-spacing:1.5px;color:#555;text-transform:uppercase;margin-bottom:5px">Tools</div>`;
    const erBtn = document.createElement("button"); erBtn.id="eraseBtn";
    erBtn.style.cssText="width:100%;padding:7px 0;border:2px solid #333;border-radius:5px;background:transparent;color:#666;font-size:11px;font-family:inherit;";
    erBtn.textContent="✕  Erase top layer";
    erBtn.addEventListener("click",()=>this.setType("erase"));
    erSec.appendChild(erBtn); sb.appendChild(erSec);

    sb.appendChild(Object.assign(document.createElement("div"),{style:"flex:1;min-height:8px;"}));

    // Footer
    const foot = document.createElement("div");
    foot.style.cssText="padding:8px 10px 14px;border-top:1px solid #222;display:flex;flex-direction:column;gap:5px;flex-shrink:0;";
    this.statsEl = document.createElement("div");
    this.statsEl.style.cssText="display:flex;justify-content:space-between;font-size:10px;color:#555;padding:0 2px;";
    this.statsEl.innerHTML="<span>0 segments</span><span></span>";
    foot.appendChild(this.statsEl);
    // Export .py (full width)
    const expPyBtn = document.createElement("button");
    expPyBtn.textContent="Export .py";
    expPyBtn.style.cssText="background:#3a8fff;color:#fff;border:none;border-radius:5px;padding:8px 0;font-family:inherit;font-size:12px;font-weight:600;";
    expPyBtn.addEventListener("click",()=>this.exportPY());
    foot.appendChild(expPyBtn);
    // Load .py
    const impPyBtn = document.createElement("button");
    impPyBtn.textContent="Load .py";
    impPyBtn.style.cssText="background:transparent;color:#3a8fff;border:1px solid #3a8fff;border-radius:5px;padding:6px 0;font-family:inherit;font-size:11px;";
    impPyBtn.addEventListener("click",()=>this.importPY());
    foot.appendChild(impPyBtn);
    const clrBtn = document.createElement("button");
    clrBtn.textContent="Clear all";
    clrBtn.style.cssText="background:transparent;color:#666;border:1px solid #333;border-radius:5px;padding:6px 0;font-family:inherit;font-size:11px;";
    clrBtn.addEventListener("click",()=>{ this._snapshot(); this.segments=[]; this.redraw(); this.updateStats(); this.showToast("Cleared"); });
    foot.appendChild(clrBtn);
    sb.appendChild(foot);

    /* MAIN */
    const main = document.createElement("div");
    main.style.cssText="flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;";

    const tbar = document.createElement("div");
    tbar.style.cssText="height:33px;background:#141414;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 10px;gap:10px;font-size:10px;color:#555;flex-shrink:0;";
    tbar.innerHTML="<span>LMB draw · RMB erase cell · MMB/Alt+drag pan · scroll zoom · Cmd/Ctrl+Z undo · +Shift redo</span>";
    this.zoomLbl = document.createElement("span");
    this.zoomLbl.style.cssText="margin-left:auto;color:#666;";
    this.zoomLbl.textContent="100%";
    tbar.appendChild(this.zoomLbl);
    const rstBtn = document.createElement("button");
    rstBtn.textContent="fit"; rstBtn.style.cssText="background:none;border:1px solid #333;color:#666;border-radius:4px;padding:2px 8px;font-family:inherit;font-size:10px;";
    rstBtn.addEventListener("click",()=>{
      const cw=this.wrap.clientWidth||600, ch=this.wrap.clientHeight||400;
      const margin=48;
      let minC=0,minR=0,maxC=16,maxR=12; // default view if nothing drawn
      if(this.segments.length){
        minC=Math.min(...this.segments.map(s=>s.col));
        minR=Math.min(...this.segments.map(s=>s.row));
        maxC=Math.max(...this.segments.map(s=>s.col))+1;
        maxR=Math.max(...this.segments.map(s=>s.row))+1;
      }
      const wCells=maxC-minC, hCells=maxR-minR;
      const zx=(cw-margin*2)/(wCells*CELL), zy=(ch-margin*2)/(hCells*CELL);
      this.zoom=Math.min(6,Math.max(0.1,Math.min(zx,zy)));
      const cp=CELL*this.zoom;
      this.pan={x:(cw-wCells*cp)/2 - minC*cp, y:(ch-hCells*cp)/2 - minR*cp};
      this.redraw(); this.zoomLbl.textContent=Math.round(this.zoom*100)+"%";
    });
    tbar.appendChild(rstBtn); main.appendChild(tbar);

    this.wrap = document.createElement("div");
    this.wrap.style.cssText="flex:1;position:relative;overflow:hidden;cursor:crosshair;";
    this.canvas = document.createElement("canvas");
    this.wrap.appendChild(this.canvas);

    this.emptyEl = document.createElement("div");
    this.emptyEl.style.cssText="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#282828;pointer-events:none;";
    this.emptyEl.innerHTML=`<div style="font-size:32px;margin-bottom:10px">╲ │ ╱</div><div style="font-size:12px;letter-spacing:1px">pick a line type and draw on the grid</div><div style="font-size:10px;margin-top:6px;color:#222">multiple lines per cell · drag to paint</div>`;
    this.wrap.appendChild(this.emptyEl);

    this.toastEl = document.createElement("div");
    this.toastEl.style.cssText="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#222;border:1px solid #444;color:#ccc;border-radius:8px;padding:7px 16px;font-size:11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;";
    this.wrap.appendChild(this.toastEl);
    main.appendChild(this.wrap);

    const cbar = document.createElement("div");
    cbar.style.cssText="height:26px;background:#141414;border-top:1px solid #222;display:flex;align-items:center;padding:0 10px;font-size:9px;color:#444;flex-shrink:0;gap:14px;";
    this.coordEl = document.createElement("span"); this.coordEl.textContent="—";
    cbar.appendChild(this.coordEl);
    const leg = document.createElement("span");
    leg.innerHTML=`<span style="color:#f5c842">■</span> yellow &nbsp;<span style="color:#3a8fff">■</span> blue &nbsp; tape=36mm &nbsp; grid=0.5m`;
    cbar.appendChild(leg); main.appendChild(cbar);

    app.appendChild(sb); app.appendChild(main);
    this.sizeCanvas(); this.redraw(); this.bindEvents();
  }

  setColor(col) {
    this.selColor=col;
    document.querySelectorAll("[data-color]").forEach(b=>{
      b.style.border=`2px solid ${b.dataset.color===col?"#fff":"transparent"}`;
    });
    Object.entries(this.btnMap).forEach(([id,{pc}])=>{
      const npc=makePreview(id,col,60);
      const ctx=pc.getContext("2d"); ctx.clearRect(0,0,60,60); ctx.drawImage(npc,0,0);
    });
  }

  setType(id) {
    if (this.btnMap[this.selType]) {
      const {btn,lbl}=this.btnMap[this.selType];
      btn.style.borderColor="transparent"; btn.style.background="transparent"; lbl.style.color="#555";
    }
    const er=document.getElementById("eraseBtn");
    if(er){er.style.borderColor="#333";er.style.background="transparent";er.style.color="#666";}
    this.selType=id;
    if (id==="erase") {
      if(er){er.style.borderColor="#e55";er.style.background="#1e1010";er.style.color="#e55";}
    } else if (this.btnMap[id]) {
      const {btn,lbl}=this.btnMap[id];
      btn.style.borderColor="#fff"; btn.style.background="#252525"; lbl.style.color="#ddd";
    }
  }

  sizeCanvas() {
    if(!this.wrap||!this.canvas)return;
    this.canvas.width=this.wrap.clientWidth||600;
    this.canvas.height=this.wrap.clientHeight||400;
  }

  getCell(e) {
    const r=this.canvas.getBoundingClientRect(), cp=CELL*this.zoom;
    return [Math.floor((e.clientX-r.left-this.pan.x)/cp), Math.floor((e.clientY-r.top-this.pan.y)/cp)];
  }

  paintCell(e) {
    const [col,row]=this.getCell(e);
    if(col<0||col>=MAX_COORD||row<0||row>=MAX_COORD)return;
    if(this.selType==="erase"){
      if(!this._strokeSnapped){this._snapshot();this._strokeSnapped=true;}
      for(let i=this.segments.length-1;i>=0;i--){
        if(this.segments[i].col===col&&this.segments[i].row===row){this.segments.splice(i,1);break;}
      }
    } else {
      const key=`${col},${row},${this.selType},${this.selColor}`;
      if(!this._stroke)this._stroke=new Set();
      if(!this._stroke.has(key)){
        if(!this._strokeSnapped){this._snapshot();this._strokeSnapped=true;}
        this._stroke.add(key);
        const paintColor = this.selType.startsWith("sf_") ? "green" : this.selColor;
        this.segments.push({col,row,type:this.selType,color:paintColor});
      }
    }
    this.redraw(); this.updateStats();
  }

  bindEvents() {
    const w=this.wrap;
    w.addEventListener("mousedown",e=>{
      if(e.button===1||e.altKey){
        this.panning=true; this.panStart={x:e.clientX-this.pan.x,y:e.clientY-this.pan.y};
        w.style.cursor="grabbing"; e.preventDefault(); return;
      }
      if(e.button===2){
        const[col,row]=this.getCell(e);
        this._snapshot();
        this.segments=this.segments.filter(s=>!(s.col===col&&s.row===row));
        this.redraw(); this.updateStats(); return;
      }
      this._stroke=new Set(); this._strokeSnapped=false; this.painting=true; this.paintCell(e);
    });
    w.addEventListener("mousemove",e=>{
      const[col,row]=this.getCell(e);
      if(col>=0&&col<MAX_COORD&&row>=0&&row<MAX_COORD)
        this.coordEl.textContent=`(${col},${row}) = (${(col*0.5).toFixed(1)}m, ${(row*0.5).toFixed(1)}m)`;
      if(this.panning&&this.panStart){this.pan={x:e.clientX-this.panStart.x,y:e.clientY-this.panStart.y};this.redraw();return;}
      if(this.painting)this.paintCell(e);
    });
    const up=()=>{this.painting=false;this.panning=false;this._stroke=null;this._strokeSnapped=false;w.style.cursor="crosshair";};
    w.addEventListener("mouseup",up); w.addEventListener("mouseleave",up);
    w.addEventListener("wheel",e=>{
      e.preventDefault();
      this.zoom=Math.min(6,Math.max(0.2,this.zoom*(e.deltaY<0?1.1:0.91)));
      this.redraw(); this.zoomLbl.textContent=Math.round(this.zoom*100)+"%";
    },{passive:false});
    w.addEventListener("contextmenu",e=>e.preventDefault());
  }

  redraw() {
    const canvas=this.canvas; if(!canvas)return;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const cp=CELL*this.zoom;
    ctx.save(); ctx.translate(this.pan.x,this.pan.y);
    // Draw only the cells visible in the current viewport (infinite grid)
    const vx0=Math.max(0,Math.floor(-this.pan.x/cp)-1);
    const vy0=Math.max(0,Math.floor(-this.pan.y/cp)-1);
    const vx1=Math.min(MAX_COORD,vx0+Math.ceil(canvas.width/cp)+2);
    const vy1=Math.min(MAX_COORD,vy0+Math.ceil(canvas.height/cp)+2);
    // Background fill for visible area
    ctx.fillStyle="#1c1c1c";
    ctx.fillRect(vx0*cp,vy0*cp,(vx1-vx0)*cp,(vy1-vy0)*cp);
    // 0.5m fine grid
    ctx.strokeStyle="#272727"; ctx.lineWidth=0.5;
    for(let c=vx0;c<=vx1;c++){ctx.beginPath();ctx.moveTo(c*cp,vy0*cp);ctx.lineTo(c*cp,vy1*cp);ctx.stroke();}
    for(let r=vy0;r<=vy1;r++){ctx.beginPath();ctx.moveTo(vx0*cp,r*cp);ctx.lineTo(vx1*cp,r*cp);ctx.stroke();}
    // 1m grid
    ctx.strokeStyle="#3c3c3c"; ctx.lineWidth=1;
    for(let c=vx0;c<=vx1;c+=2){ctx.beginPath();ctx.moveTo(c*cp,vy0*cp);ctx.lineTo(c*cp,vy1*cp);ctx.stroke();}
    for(let r=vy0;r<=vy1;r+=2){ctx.beginPath();ctx.moveTo(vx0*cp,r*cp);ctx.lineTo(vx1*cp,r*cp);ctx.stroke();}
    // Labels
    if(this.zoom>0.45){
      ctx.fillStyle="#3a3a3a"; ctx.font=`${Math.max(8,Math.round(9*this.zoom))}px monospace`;
      ctx.textAlign="left"; ctx.textBaseline="top";
      for(let c=vx0;c<vx1;c+=2)ctx.fillText(`${(c/2).toFixed(1)}m`,c*cp+2,vy0*cp+2);
      ctx.textAlign="right";
      for(let r=vy0;r<vy1;r+=2)ctx.fillText(`${(r/2).toFixed(1)}`,vx1*cp-2,r*cp+2);
    }
    this.segments.forEach(s=>drawSeg(ctx,s.type,s.col,s.row,cp,s.color));
    ctx.restore();
    this.emptyEl.style.display=this.segments.length===0?"block":"none";
  }

  updateStats() {
    const n=this.segments.length, y=this.segments.filter(s=>s.color==="yellow").length, b=n-y;
    this.statsEl.innerHTML=`<span>${n} segments</span><span style="font-size:9px"><span style="color:#f5c842">${y}Y</span> <span style="color:#3a8fff">${b}B</span></span>`;
  }

  showToast(msg) {
    this.toastEl.textContent=msg; this.toastEl.style.opacity="1";
    clearTimeout(this._tt); this._tt=setTimeout(()=>{this.toastEl.style.opacity="0";},2500);
  }

  importPY() {
    // Open a file picker, read the selected track.py, and populate the canvas.
    const input = document.createElement("input");
    input.type = "file"; input.accept = ".py,text/plain";
    input.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const text = ev.target.result;
        try {
          const segs = this._parsePY(text);
          this._snapshot();
          this.segments = segs;
          this.redraw(); this.updateStats();
          this._importedName = file.name;
          this.showToast(`Loaded ${segs.length} segments from ${file.name}`);
        } catch(err) {
          this.showToast("Parse error: " + err.message);
          console.error(err);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  _parsePY(text) {
    // Fast path: file contains the embedded JSON segment list written by exportPY.
    const marker = "# TRACK_EDITOR_DATA:";
    const markerIdx = text.indexOf(marker);
    if (markerIdx !== -1) {
      const lineEnd = text.indexOf("\n", markerIdx);
      const json    = text.slice(markerIdx + marker.length, lineEnd === -1 ? undefined : lineEnd).trim();
      try {
        const segs = JSON.parse(json);
        if (Array.isArray(segs)) {
          // Filter to only valid cells and known types so stale data can't break things
          const knownTypes = new Set([
            "sh_t","sh_b","sv_l","sv_r","d_nwse","d_nesw",
            "hc_n","hc_s","hc_e","hc_w",
            "a05_ne","a05_nw","a05_se","a05_sw",
            "a1_ne","a1_nw","a1_se","a1_sw",
            "sf_h","sf_v",
          ]);
          return segs.filter(s =>
            typeof s.col==="number" && typeof s.row==="number" &&
            s.col>=0 && s.col<MAX_COORD && s.row>=0 && s.row<MAX_COORD &&
            knownTypes.has(s.type) &&
            (s.color==="yellow"||s.color==="blue")
          );
        }
      } catch(e) { /* fall through to geometry parser */ }
    }

    // Slow path: no embedded data (file made by an older version).
    // Reconstruct from geometry — handles straights/diagonals only;
    // arcs will be missing but at least straights survive.
    const S   = 0.5;
    const TW  = TAPE_REAL;
    const ins = TW / 2;
    const EPS = 2e-3;
    const eq  = (a,b) => Math.abs(a-b) < EPS;

    const extractList = (src, name) => {
      const re  = new RegExp(name + "\\s*=\\s*\\[[\\s\\S]*?\\]");
      const m   = src.match(re); if (!m) return [];
      const segRe = /\(\s*\(\s*([\d.e+\-]+)\s*,\s*([\d.e+\-]+)\s*\)\s*,\s*\(\s*([\d.e+\-]+)\s*,\s*([\d.e+\-]+)\s*\)\s*\)/g;
      const out = []; let sm;
      while ((sm = segRe.exec(m[0])) !== null)
        out.push([[+sm[1],+sm[2]],[+sm[3],+sm[4]]]);
      return out;
    };

    const segs = [];
    const classify = (pairs, color) => {
      pairs.forEach(([[x0,y0],[x1,y1]]) => {
        const midX=(x0+x1)/2, midY=(y0+y1)/2;
        for (let col=Math.max(0,Math.floor(midX/S)-1); col<=Math.ceil(midX/S); col++) {
          for (let row=Math.max(0,Math.floor(midY/S)-1); row<=Math.ceil(midY/S); row++) {
            const L=col*S, T=row*S, R=L+S, B=T+S;
            const di=ins/Math.SQRT2;
            const tests = [
              ["sh_t", eq(y0,T+ins)&&eq(y1,T+ins)&&eq(x0,L)&&eq(x1,R)],
              ["sh_b", eq(y0,B-ins)&&eq(y1,B-ins)&&eq(x0,L)&&eq(x1,R)],
              ["sv_l", eq(x0,L+ins)&&eq(x1,L+ins)&&eq(y0,T)&&eq(y1,B)],
              ["sv_r", eq(x0,R-ins)&&eq(x1,R-ins)&&eq(y0,T)&&eq(y1,B)],
              ["d_nwse",eq(x0,L+di)&&eq(y0,T+di)&&eq(x1,R-di)&&eq(y1,B-di)],
              ["d_nesw",eq(x0,R-di)&&eq(y0,T+di)&&eq(x1,L+di)&&eq(y1,B-di)],
            ];
            for (const [type,match] of tests) {
              if (match) { segs.push({col,row,type,color}); return; }
            }
          }
        }
      });
    };
    classify(extractList(text,"YELLOW_SEGMENTS"),"yellow");
    classify(extractList(text,"BLUE_SEGMENTS"),  "blue");
    return segs;
  }

  exportPY() {
    if (!this.segments.length) { this.showToast("Nothing to export"); return; }

    const ARC_N = 12;  // straight-line segments per arc
    const S = REAL;    // 0.5 m per cell

    // Grid cell corner -> metres (origin top-left, X right, Y down)
    const mx = c => c * S;
    const my = r => r * S;

    const yellow = [], blue = [];

    this.segments.forEach(seg => {
      const { col, row, type, color } = seg;
      // sf_* segments are handled exclusively by the green pass below — skip here
      if (type.startsWith("sf_")) return;
      const list = color === "yellow" ? yellow : blue;
      const x0 = mx(col),     y0 = my(row);
      const x1 = mx(col + 1), y1 = my(row + 1);

      const TW = TAPE_REAL;   // tape width in metres — matches the inset
      const ins = TW / 2;

      if (type === "sh_t") {
        list.push([[x0, y0 + ins], [x1, y0 + ins]]);
      } else if (type === "sh_b") {
        list.push([[x0, y1 - ins], [x1, y1 - ins]]);
      } else if (type === "sv_l") {
        list.push([[x0 + ins, y0], [x0 + ins, y1]]);
      } else if (type === "sv_r") {
        list.push([[x1 - ins, y0], [x1 - ins, y1]]);
      } else if (type === "d_nwse") {
        const di = ins / Math.SQRT2;
        list.push([[x0 + di, y0 + di], [x1 - di, y1 - di]]);
      } else if (type === "d_nesw") {
        const di = ins / Math.SQRT2;
        list.push([[x1 - di, y0 + di], [x0 + di, y1 - di]]);
      } else if (type.startsWith("hc_")) {
        // Half-circle: radius = S/2, tessellated as ARC_N segments
        const dir = type.slice(3);
        const r   = S / 2;   // half-cell radius (no inset — matches drawSeg)
        let ocx, ocy, a0, a1;
        // Angles produce the same chord sequence as drawSeg canvas arcs.
        // da = a1-a0 drives the linear tessellation; must sweep the correct semicircle.
        // hc_n: drawSeg decreasing π→0 (bottom half) → da=-π
        // hc_s: drawSeg decreasing 0→-π (top half)  → da=-π (a1=0-π=-π)
        // hc_e: drawSeg INCREASING π/2→3π/2 (left half) → da=+π (a1=π/2+π)
        // hc_w: drawSeg increasing -π/2→π/2 (right half) → da=+π ✓ already correct
        if (dir === "n") { ocx=(x0+x1)/2; ocy=y0+ins;    a0=Math.PI;       a1=0;                  }
        if (dir === "s") { ocx=(x0+x1)/2; ocy=y1-ins;    a0=0;             a1=-Math.PI;            }
        if (dir === "e") { ocx=x1-ins;    ocy=(y0+y1)/2; a0=Math.PI/2;     a1=Math.PI/2+Math.PI;  }
        if (dir === "w") { ocx=x0+ins;    ocy=(y0+y1)/2; a0=-Math.PI/2;    a1=Math.PI/2;          }
        const da = a1 - a0;
        for (let i = 0; i < ARC_N; i++) {
          const ta = a0 + da * i / ARC_N;
          const tb = a0 + da * (i + 1) / ARC_N;
          const ax = ocx + r * Math.cos(ta), ay = ocy + r * Math.sin(ta);
          const bx = ocx + r * Math.cos(tb), by = ocy + r * Math.sin(tb);
          list.push([[parseFloat(ax.toFixed(6)), parseFloat(ay.toFixed(6))],
                     [parseFloat(bx.toFixed(6)), parseFloat(by.toFixed(6))]]);
        }
      } else if (type === "sf_h") {
        list.push([[x0, (y0+y1)/2], [x1, (y0+y1)/2]]);
      } else if (type === "sf_v") {
        list.push([[(x0+x1)/2, y0], [(x0+x1)/2, y1]]);
      } else {
        // Quarter-arc corners: centreline at radius r − ins
        const isR1 = type.startsWith("a1_");
        const dir  = type.slice(type.lastIndexOf("_") + 1);
        const r    = (isR1 ? S * 2 : S) - ins;
        let ocx, ocy, a0, a1;
        if (dir === "ne") { ocx = x0; ocy = y1; a0 = -Math.PI / 2; a1 = 0;            }
        if (dir === "nw") { ocx = x1; ocy = y1; a0 = -Math.PI;     a1 = -Math.PI / 2; }
        if (dir === "se") { ocx = x0; ocy = y0; a0 =  Math.PI / 2; a1 = 0;            }
        if (dir === "sw") { ocx = x1; ocy = y0; a0 =  Math.PI / 2; a1 = Math.PI;      }
        const da = a1 - a0;
        for (let i = 0; i < ARC_N; i++) {
          const ta = a0 + da * i / ARC_N;
          const tb = a0 + da * (i + 1) / ARC_N;
          const ax = ocx + r * Math.cos(ta), ay = ocy + r * Math.sin(ta);
          const bx = ocx + r * Math.cos(tb), by = ocy + r * Math.sin(tb);
          list.push([[parseFloat(ax.toFixed(6)), parseFloat(ay.toFixed(6))],
                     [parseFloat(bx.toFixed(6)), parseFloat(by.toFixed(6))]]);
        }
      }
    });

    const fmtSeg = ([p0, p1]) =>
      `    ((${p0[0].toFixed(4)}, ${p0[1].toFixed(4)}), (${p1[0].toFixed(4)}, ${p1[1].toFixed(4)}))`;
    const fmtList = (segs, name) => {
      if (!segs.length) return `${name} = []\n`;
      return `${name} = [\n    # ((x0, y0), (x1, y1)) in metres\n${segs.map(fmtSeg).join(",\n")}\n]\n`;
    };

    // Arena bounds from all segments, origin preserved at (0,0)
    const allX = this.segments.map(s => [s.col * S, (s.col + 1) * S]).flat();
    const allY = this.segments.map(s => [s.row * S, (s.row + 1) * S]).flat();
    const arenaW = (Math.max(...allX) + S).toFixed(1);
    const arenaH = (Math.max(...allY) + S).toFixed(1);

    // Spawn: centre of first start/finish segment; fallback to arena centre
    const sfSeg = this.segments.find(s => s.type.startsWith("sf_"));
    const spawnX = sfSeg ? ((sfSeg.col + 0.5) * S).toFixed(3) : (Math.max(...allX) / 2).toFixed(3);
    const spawnY = sfSeg ? ((sfSeg.row + 0.5) * S).toFixed(3) : (Math.max(...allY) / 2).toFixed(3);

    // Green start/finish segments
    const green = [];
    this.segments.forEach(seg => {
      const { col, row, type } = seg;
      if (!type.startsWith("sf_")) return;
      const x0 = col * S, y0 = row * S, x1 = (col+1)*S, y1 = (row+1)*S;
      const cx = (x0+x1)/2, cy = (y0+y1)/2;
      if (type === "sf_h") green.push([[x0, cy], [x1, cy]]);
      else         green.push([[cx, y0], [cx, y1]]);
    });

    const py = [
      `# Auto-generated track definition`,
      `# Coordinate system: origin top-left, X right, Y down, units = metres`,
      `# Generated by DRC Track Builder`,
      ``,
      `REAL = ${REAL}  # metres per grid cell`,
      ``,
      `# Arena dimensions and spawn (from start/finish line or arena centre)`,
      `ARENA_W = ${arenaW}`,
      `ARENA_H = ${arenaH}`,
      `SPAWN_X = ${spawnX}`,
      `SPAWN_Y = ${spawnY}`,
      ``,
      fmtList(yellow, "YELLOW_SEGMENTS"),
      fmtList(blue,   "BLUE_SEGMENTS"),
      fmtList(green,  "GREEN_SEGMENTS"),
    ].join("\n");

    // Embed the raw segment list as a JSON comment so importPY can round-trip
    // perfectly without any geometry reconstruction.
    const segJSON = JSON.stringify(this.segments);
    const pyFull  = `# TRACK_EDITOR_DATA:${segJSON}\n` + py;

    // Ask for a filename — pre-fill with the last imported name or "track"
    const defaultName = (this._importedName || "track").replace(/\.py$/i,"");
    const chosen = window.prompt("Save track as:", defaultName);
    if (!chosen) return;  // user cancelled
    const fname = chosen.trim().replace(/\.py$/i,"") + ".py";
    this._importedName = fname;  // remember for next export

    const blob = new Blob([pyFull], { type: "text/plain" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);
    this.showToast(`Saved ${fname} — ${yellow.length}Y + ${blue.length}B segs`);
  }

}

new App();
</script>
</body>
</html>
